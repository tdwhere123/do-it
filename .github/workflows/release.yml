name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish @tdwhere/do-it to npm (requires NPM_TOKEN secret)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Install system test tools
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate release tag and metadata
        if: github.event_name == 'push'
        run: npm run validate:release -- "${GITHUB_REF_NAME}"

      - name: Full test suite
        run: npm test

      - name: Build all host plugins
        run: |
          npm run build:claude-agents
          npm run build:codex-plugin
          npm run build:cursor-plugin
          npm run build:opencode-plugin
          npm run validate:kimi-plugin

      - name: Smoke packed root and OpenCode packages
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: npm run smoke:package

      - name: Ensure generated artifacts are committed and unchanged by smoke
        run: |
          git diff --exit-code -- index.json dist/claude .agents/plugins plugins/do-it plugins/do-it-cursor plugins/do-it-opencode .cursor-plugin

      - name: Pack release tarball
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: |
          npm pack --json --ignore-scripts | tee "${{ runner.temp }}/pack.json"
          jq -e '.[0].filename' "${{ runner.temp }}/pack.json"

      - name: Upload pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack
          path: "*.tgz"
          if-no-files-found: error

  publish-npm:
    name: Publish npm (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && inputs.publish_npm == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Validate release tag and metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_VERSION=$(node -p "require('./package.json').version")
            RELEASE_TAG="v${RELEASE_VERSION}"
          fi
          npm run validate:release -- "${RELEASE_TAG}"

      - name: Download verified package
        uses: actions/download-artifact@v4
        with:
          name: npm-pack

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required to publish" >&2
            exit 1
          fi
          TARBALL=$(find . -maxdepth 1 -name '*.tgz' -print -quit)
          test -n "${TARBALL}"
          npm publish "${TARBALL}" --access public
