name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [18.x, 20.x, 22.x, 24.x]
        # macOS ships BSD find/sed/awk/date; one job there guards the hook
        # scripts against GNU-only assumptions. The divergence is node-version
        # independent, so a single Node is enough.
        include:
          - os: macos-latest
            node-version: 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system test tools
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install jq shellcheck
          else
            sudo apt-get update && sudo apt-get install -y jq shellcheck
          fi

      - name: Check whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check HEAD^1 HEAD
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi

      - name: Run hook tests
        run: npm test

      - name: Build Claude agents
        run: npm run build:claude-agents

      - name: Ensure generated Claude agents are committed
        run: git diff --exit-code -- dist/claude

      - name: Build Codex plugin
        run: npm run build:codex-plugin

      - name: Ensure generated Codex plugin is committed
        run: git diff --exit-code -- .agents/plugins plugins/do-it

      - name: Build Cursor plugin
        run: npm run build:cursor-plugin

      - name: Ensure generated Cursor plugin is committed
        run: git diff --exit-code -- plugins/do-it-cursor .cursor-plugin

      - name: Build OpenCode plugin
        run: npm run build:opencode-plugin

      - name: Ensure generated OpenCode plugin is committed
        run: git diff --exit-code -- plugins/do-it-opencode

      - name: Smoke Cursor local install (real copy, no external symlink)
        env:
          HOME: ${{ runner.temp }}/cursor-local-home
        run: |
          npm run install:cursor-local
          test -f "$HOME/.cursor/plugins/local/do-it-cursor/.cursor-plugin/plugin.json"
          test ! -L "$HOME/.cursor/plugins/local/do-it-cursor"
          test -f "$HOME/.cursor/plugins/local/do-it-cursor/skills/do-it-router/SKILL.md"
          test -f "$HOME/.cursor/hooks.json"
          grep -q 'run-hook.cmd' "$HOME/.cursor/hooks.json"
          ! grep -E 'do-it-cursor/hooks/[^"]+\.sh"' "$HOME/.cursor/hooks.json"
          test -f "$HOME/.cursor/plugins/local/do-it-cursor/hooks/run-hook.cmd"
          HOME="$HOME" npm run doctor:cursor
          # Polyglot runner must work under bash on Linux/macOS too.
          CURSOR_PLUGIN_ROOT="$HOME/.cursor/plugins/local/do-it-cursor" \
            CURSOR_PLUGIN_DATA="$CURSOR_PLUGIN_ROOT/.do-it-data" \
            CURSOR_VERSION=ci \
            bash "$CURSOR_PLUGIN_ROOT/hooks/run-hook.cmd" session-start \
            <<<"{\"session_id\":\"ci-smoke\",\"hook_event_name\":\"sessionStart\"}" | grep -q additional_context

  windows-smoke:
    name: Windows smoke (Node ${{ matrix.node-version }})
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Cursor plugin (native USERPROFILE path)
        shell: pwsh
        run: |
          npm run build:cursor-plugin
          node scripts/install-cursor-local.mjs
          $dest = Join-Path $env:USERPROFILE ".cursor\plugins\local\do-it-cursor"
          $manifest = Join-Path $dest ".cursor-plugin\plugin.json"
          $runner = Join-Path $dest "hooks\run-hook.cmd"
          $hooks = Join-Path $env:USERPROFILE ".cursor\hooks.json"
          if (-not (Test-Path $manifest)) { throw "missing $manifest" }
          if (-not (Test-Path $runner)) { throw "missing $runner" }
          if (-not (Test-Path $hooks)) { throw "missing $hooks" }
          $hooksText = Get-Content -Raw $hooks
          if ($hooksText -notmatch 'run-hook\.cmd') {
            throw "hooks.json missing run-hook.cmd entrypoints"
          }
          if ($hooksText -match 'do-it-cursor[/\\]hooks[/\\][^"\\]+\.sh"') {
            throw "hooks.json still points at bare .sh (Windows would open them as files)"
          }
          if (Select-String -Path $hooks -Pattern 'do-it-cursor[/\\]hooks' -Quiet) {
            Write-Host "user hooks wired via run-hook.cmd"
          } else {
            throw "hooks.json missing do-it-cursor entries"
          }
          # Guard against the old /mnt/c rewrite landing under the current drive.
          if (Test-Path ".\mnt\c\Users") { throw "unexpected relative mnt install path" }

      - name: Smoke run-hook.cmd session-start
        shell: cmd
        run: |
          set CURSOR_PLUGIN_ROOT=%USERPROFILE%\.cursor\plugins\local\do-it-cursor
          set CURSOR_PLUGIN_DATA=%CURSOR_PLUGIN_ROOT%\.do-it-data
          set CURSOR_VERSION=ci
          echo {"session_id":"ci-smoke","hook_event_name":"sessionStart"} | "%CURSOR_PLUGIN_ROOT%\hooks\run-hook.cmd" session-start

      - name: Doctor cursor target
        shell: pwsh
        run: |
          $env:HOME = $env:USERPROFILE
          npm run doctor:cursor

      - name: Keyword match smoke under Git Bash
        shell: bash
        run: |
          set -uo pipefail
          source hooks/lib/common.sh
          export MSYSTEM=MINGW64
          # Force MSYS path even though the runner is Git Bash-capable.
          if ! do_it_prompt_has_word "please implement the fix now" "implement"; then
            echo "expected implement match" >&2
            exit 1
          fi
          if do_it_prompt_has_word "prefix only" "fix"; then
            echo "fix must not match prefix" >&2
            exit 1
          fi
          echo "ok: msys keyword match"

  package-smoke:
    name: Package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install system test tools
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate package metadata
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Build Claude agents
        run: npm run build:claude-agents

      - name: Build Codex plugin
        run: npm run build:codex-plugin

      - name: Smoke test Codex install target
        env:
          CODEX_HOME: ${{ runner.temp }}/do-it-codex
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: npm exec --package . -- do-it setup

      - name: Smoke test Claude Code install target
        env:
          CLAUDE_PLUGIN_ROOT_OVERRIDE: ${{ runner.temp }}/do-it-claude
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: npm exec --package . -- do-it setup --target=claude

      - name: Smoke test Cursor install target
        env:
          HOME: ${{ runner.temp }}/do-it-cursor-home
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: |
          npm exec --package . -- do-it setup --target=cursor
          test -f "$HOME/.cursor/plugins/local/do-it-cursor/.cursor-plugin/plugin.json"
          test ! -L "$HOME/.cursor/plugins/local/do-it-cursor"

      - name: Inspect package tarball
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: npm pack --dry-run --json
