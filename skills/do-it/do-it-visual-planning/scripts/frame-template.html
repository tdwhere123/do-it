<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>do-it Visual Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;450;500;600&display=swap" rel="stylesheet">
  <style>
    /*
     * do-it VISUAL PLANNING FRAME TEMPLATE
     *
     * Aesthetic: editorial-technical. Fraunces display serif + IBM Plex
     * Sans/Mono, warm-paper light theme, deep-ink dark theme, a faint grid
     * texture, and staggered load motion.
     *
     * Content is injected at the <!-- CONTENT --> placeholder in #do-it-content.
     * All class names below form the contract consumed by helper.js and
     * server.cjs (.option/.card/.selected/#indicator-text/...) — keep them.
     */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== THEME VARIABLES — light (warm paper) ===== */
    :root {
      --bg-primary: #f3f1ec;
      --bg-secondary: #ffffff;
      --bg-tertiary: #ece9e1;
      --bg-code: #f6f4ee;
      --border: #ddd8cb;
      --border-strong: #c8c2b1;
      --grid: rgba(46, 40, 22, 0.04);
      --text-primary: #201e18;
      --text-secondary: #6c6557;
      --text-tertiary: #9b9484;
      --accent: #2f5fe0;
      --accent-hover: #1f48bf;
      --accent-soft: rgba(47, 95, 224, 0.10);
      --success: #2f9e44;
      --warning: #bd820c;
      --error: #d4443c;
      --selected-bg: rgba(47, 95, 224, 0.08);
      --selected-border: #2f5fe0;
      --shadow-sm: 0 1px 2px rgba(28, 24, 14, 0.06);
      --shadow-md: 0 1px 2px rgba(28, 24, 14, 0.05), 0 10px 26px -14px rgba(28, 24, 14, 0.28);
      --font-display: 'Fraunces', 'Iowan Old Style', Georgia, 'Times New Roman', serif;
      --font-body: 'IBM Plex Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #15161c;
        --bg-secondary: #1d1f28;
        --bg-tertiary: #282b38;
        --bg-code: #11121a;
        --border: #313440;
        --border-strong: #444855;
        --grid: rgba(255, 255, 255, 0.022);
        --text-primary: #e9e9ee;
        --text-secondary: #a1a1af;
        --text-tertiary: #6b6c7b;
        --accent: #7c9bff;
        --accent-hover: #98b0ff;
        --accent-soft: rgba(124, 155, 255, 0.14);
        --success: #4cc46a;
        --warning: #e0a93a;
        --error: #f0635a;
        --selected-bg: rgba(124, 155, 255, 0.12);
        --selected-border: #7c9bff;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);
        --shadow-md: 0 1px 2px rgba(0, 0, 0, 0.4), 0 14px 32px -16px rgba(0, 0, 0, 0.7);
      }
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    ::selection { background: var(--accent-soft); }

    /* ===== FRAME: HEADER ===== */
    .header {
      position: relative;
      flex-shrink: 0;
      height: 3.1rem;
      padding: 0 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .header::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent 38%);
      opacity: 0.85;
    }
    .header h1 { font-size: 1rem; font-weight: 400; }
    .header h1 a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: inherit;
      text-decoration: none;
    }
    .brand-mark {
      width: 1.4rem; height: 1.4rem;
      border-radius: 6px;
      background: linear-gradient(140deg, var(--accent), var(--accent-hover));
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      position: relative;
      flex-shrink: 0;
    }
    .brand-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: 0.42rem; height: 0.42rem;
      border-radius: 2px;
      background: var(--bg-secondary);
    }
    .brand-name {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }
    .brand-sub {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      padding-left: 0.6rem;
      border-left: 1px solid var(--border);
    }
    .header .status {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .header .status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 0 var(--success);
      animation: pulse 2.6s ease-out infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--success) 55%, transparent); }
      70%, 100% { box-shadow: 0 0 0 7px transparent; }
    }

    /* ===== FRAME: MAIN ===== */
    .main {
      flex: 1;
      overflow-y: auto;
      background-color: var(--bg-primary);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 30px 30px;
      background-position: center top;
    }
    .main::-webkit-scrollbar { width: 11px; }
    .main::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border: 3px solid var(--bg-primary);
      border-radius: 999px;
    }
    .main::-webkit-scrollbar-track { background: transparent; }

    #do-it-content {
      max-width: 50rem;
      margin: 0 auto;
      padding: 2.75rem 2.25rem 4.5rem;
      min-height: 100%;
    }

    /* ===== FRAME: INDICATOR BAR ===== */
    .indicator-bar {
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 0.6rem 1.4rem;
      text-align: center;
    }
    .indicator-bar span {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
    }
    .indicator-bar .selected-text {
      color: var(--accent);
      font-weight: 600;
    }

    /* ===== TYPOGRAPHY ===== */
    h2 {
      font-family: var(--font-display);
      font-optical-sizing: auto;
      font-size: 2.05rem;
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.014em;
      margin-bottom: 0.55rem;
    }
    h3 {
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-bottom: 0.25rem;
    }
    h4 { font-family: var(--font-body); }
    p { color: var(--text-primary); }
    a { color: var(--accent); }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.02rem;
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }

    /* Section eyebrow label — monospace with an accent tick. */
    .label {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      margin-bottom: 0.7rem;
    }
    .label::before {
      content: '';
      width: 1.1rem; height: 2px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Sections: staggered rise-in on load. */
    .section { margin-bottom: 2rem; }
    .section > p { color: var(--text-secondary); }
    .section ul { margin-left: 1.15rem; }
    .section li { margin-bottom: 0.35rem; color: var(--text-secondary); }
    #do-it-content > .section {
      animation: rise 0.5s cubic-bezier(0.22, 0.7, 0.2, 1) both;
    }
    #do-it-content > .section:nth-child(1) { animation-delay: 0.02s; }
    #do-it-content > .section:nth-child(2) { animation-delay: 0.08s; }
    #do-it-content > .section:nth-child(3) { animation-delay: 0.14s; }
    #do-it-content > .section:nth-child(4) { animation-delay: 0.20s; }
    #do-it-content > .section:nth-child(5) { animation-delay: 0.26s; }
    #do-it-content > .section:nth-child(6) { animation-delay: 0.32s; }
    #do-it-content > .section:nth-child(n+7) { animation-delay: 0.38s; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    code, .mono { font-family: var(--font-mono); font-size: 0.86em; }
    .section :not(pre) > code {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.05rem 0.32rem;
      color: var(--text-primary);
    }

    /* ===== META ROW — monospace key/value chips ===== */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.6rem;
    }
    .meta-row span {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.26rem 0.72rem;
      box-shadow: var(--shadow-sm);
    }
    .meta-row b { color: var(--text-primary); font-weight: 600; }

    /* ===== OPTIONS (A/B/C choices) ===== */
    .options { display: flex; flex-direction: column; gap: 0.7rem; }
    .option {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
    }
    .option:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .option.selected { background: var(--selected-bg); border-color: var(--selected-border); box-shadow: var(--shadow-md); }
    .option .letter {
      font-family: var(--font-mono);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      width: 1.8rem; height: 1.8rem;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 0.82rem; flex-shrink: 0;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .option.selected .letter { background: var(--accent); color: #fff; }
    .option .content { flex: 1; }
    .option .content h3 { font-size: 0.95rem; margin-bottom: 0.15rem; }
    .option .content p { color: var(--text-secondary); font-size: 0.86rem; margin: 0; }

    /* ===== CARDS (designs / mockups) ===== */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1rem; }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 13px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .card.selected { border-color: var(--selected-border); box-shadow: var(--shadow-md); }
    .card-image { background: var(--bg-tertiary); aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; }
    .card-body { padding: 1rem 1.1rem; }
    .card-body h3 { margin-bottom: 0.25rem; }
    .card-body p { color: var(--text-secondary); font-size: 0.86rem; }

    /* ===== MOCKUP CONTAINER ===== */
    .mockup {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 13px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .mockup-header {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }
    .mockup-body { padding: 1.5rem; }

    /* ===== SPLIT VIEW ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

    /* ===== PROS / CONS ===== */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .pros, .cons {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 1rem 1.1rem;
    }
    .pros h4, .cons h4 {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.55rem;
    }
    .pros h4 { color: var(--success); }
    .cons h4 { color: var(--error); }
    .pros ul, .cons ul { margin-left: 1.15rem; font-size: 0.86rem; color: var(--text-secondary); }
    .pros li, .cons li { margin-bottom: 0.28rem; }

    /* ===== PLACEHOLDER ===== */
    .placeholder {
      background: var(--bg-tertiary);
      border: 1.5px dashed var(--border-strong);
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    /* ===== INLINE MOCKUP ELEMENTS ===== */
    .mock-nav { background: var(--accent); color: #fff; padding: 0.75rem 1rem; display: flex; gap: 1.5rem; font-size: 0.9rem; }
    .mock-sidebar { background: var(--bg-tertiary); padding: 1rem; min-width: 180px; }
    .mock-content { padding: 1.5rem; flex: 1; }
    .mock-button { background: var(--accent); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 7px; font-size: 0.85rem; font-family: var(--font-body); cursor: pointer; }
    .mock-input { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 7px; padding: 0.5rem; width: 100%; font-family: var(--font-body); }

    /* ===== SCENARIO TEMPLATES (plan card / review report) ===== */
    table.do-it-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.85rem;
      margin: 0.5rem 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    table.do-it-table th, table.do-it-table td {
      padding: 0.55rem 0.8rem;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }
    table.do-it-table tr:last-child td { border-bottom: none; }
    table.do-it-table th {
      background: var(--bg-tertiary);
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }
    table.do-it-table td:first-child {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }
    table.do-it-table td { color: var(--text-secondary); }

    .finding {
      position: relative;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border-strong);
      border-radius: 9px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.7rem;
      box-shadow: var(--shadow-sm);
    }
    .finding .sev {
      font-family: var(--font-mono);
      font-size: 0.64rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin-bottom: 0.3rem;
    }
    .finding p { font-size: 0.9rem; color: var(--text-primary); }
    .finding.blocking { border-left-color: var(--error); }
    .finding.blocking .sev { color: var(--error); }
    .finding.important { border-left-color: var(--warning); }
    .finding.important .sev { color: var(--warning); }
    .finding.opportunity { border-left-color: var(--success); }
    .finding.opportunity .sev { color: var(--success); }
    .finding .evidence {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      line-height: 1.55;
      color: var(--text-secondary);
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.6rem;
      margin-top: 0.45rem;
      white-space: pre-wrap;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>
      <a href="https://github.com/tdwhere/do-it">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">do-it</span>
        <span class="brand-sub">Visual Planning</span>
      </a>
    </h1>
    <div class="status">Connected</div>
  </header>

  <div class="main">
    <div id="do-it-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text">Click an option above, then return to the terminal</span>
  </div>

</body>
</html>
