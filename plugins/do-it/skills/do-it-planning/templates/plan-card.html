<!--
  do-it plan-card template — a CONTENT FRAGMENT for do-it-planning § Visual Aids.

  Usage: copy this fragment into the companion server's screen_dir (see
  references/visual-companion.md), fill every `slot:` placeholder with real
  content, and delete any section you do not need. The server wraps the
  fragment in frame-template.html, which carries all CSS — so do NOT add
  <html>, <head>, <body>, or a <style> block here. The shared frame styling
  is the reason a fragment is small: only the content varies per card.

  Section order mirrors the task-card layout in do-it-planning so a visual
  card and a written card stay consistent.
-->
<div class="section">
  <h2><!-- slot: card title --></h2>
  <p class="subtitle"><!-- slot: one-sentence goal — one card, one outcome --></p>
  <div class="meta-row">
    <span><b>Tier:</b> <!-- slot: Light | Standard | Heavy --></span>
    <span><b>Size:</b> <!-- slot: S | M | L | XL --></span>
    <span><b>Owner:</b> <!-- slot: owner, or unassigned --></span>
  </div>
</div>

<div class="section">
  <div class="label">Background &amp; Goal</div>
  <p><!-- slot: why this work matters, then the single outcome it delivers --></p>
</div>

<div class="section">
  <div class="label">Allowed Scope</div>
  <ul>
    <li><!-- slot: file or file group — what changes and why --></li>
  </ul>
</div>

<div class="section">
  <div class="label">Acceptance Criteria</div>
  <table class="do-it-table">
    <thead><tr><th>AC</th><th>Criteria</th><th>Evidence</th></tr></thead>
    <tbody>
      <tr><td>AC1</td><td><!-- slot: criterion --></td><td><!-- slot: verifiable artifact --></td></tr>
    </tbody>
  </table>
</div>

<div class="section">
  <div class="label">Verification</div>
  <p><!-- slot: concrete commands, ordered build &rarr; test &rarr; lint --></p>
</div>

<div class="section">
  <div class="label">Risks &amp; Shared-File Hazards</div>
  <ul>
    <li><!-- slot: risk or shared-file hazard, or "No shared-file hazards." --></li>
  </ul>
</div>
